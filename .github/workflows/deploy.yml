- name: Deploy each function
  run: |
    set -e
    set -x

    mkdir build   # 🔥 MOVE OUTSIDE LOOP

    for file in *.js; do
      base=$(basename "$file" .js)
      fname="$base"

      echo "Deploying $fname"

      # 🔥 CLEAN BUILD FOLDER
      rm -rf build/*
      cp $file build/
      cp package.json build/

      # 🔥 install dependencies per function (lighter)
      cd build
      npm install --omit=dev

      zip -r ../$fname.zip .
      cd ..

      echo "Updating function..."

      aws lambda update-function-code \
        --function-name $fname \
        --zip-file fileb://$fname.zip \
        --region ap-southeast-2 || \

      (
        echo "Function not found, creating..."
        aws lambda create-function \
          --function-name $fname \
          --runtime nodejs18.x \
          --role arn:aws:iam::257394495871:role/lambda-paul-role \
          --handler $base.handler \
          --zip-file fileb://$fname.zip \
          --region ap-southeast-2
      )

      rm -f $fname.zip

    done